name: Web2APK

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'URL Website'
        required: true
      app_name:
        description: 'Nama Aplikasi'
        required: true
      icon_url:
        description: 'Icon Url'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
          cache: true

      - name: Create Flutter Project
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PKG=$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | tr -cd '[:alnum:]_')
          flutter create --org com.webapk --project-name "$PKG" myapp

      - name: Add Assets and Dependencies
        run: |
          cd myapp
          flutter pub add webview_flutter
          flutter pub add flutter_launcher_icons
          
          # Menambahkan konfigurasi assets ke baris paling bawah untuk menghindari error indentasi YAML
          echo "  assets:" >> pubspec.yaml
          echo "    - assets/icon/" >> pubspec.yaml

      - name: Write main.dart (Splash Screen & Smooth Progress)
        run: |
          WEB_URL="${{ github.event.inputs.web_url }}"
          APP_NAME="${{ github.event.inputs.app_name }}"

          cat > myapp/lib/main.dart << DART
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'dart:async';

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setSystemUIOverlayStyle(
              const SystemUiOverlayStyle(statusBarColor: Colors.transparent)
            );
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '$APP_NAME',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(useMaterial3: true, primarySwatch: Colors.blue),
                home: const SplashScreen(),
              );
            }
          }

          // Animasi Splash Screen selama 3 detik sebelum masuk ke WebView
          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen> {
            @override
            void initState() {
              super.initState();
              Timer(const Duration(seconds: 3), () {
                Navigator.pushReplacement(
                  context,
                  MaterialPageRoute(builder: (context) => const WebViewPage()),
                );
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.white,
                body: Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      ClipRRect(
                        borderRadius: BorderRadius.circular(20),
                        child: Image.asset(
                          'assets/icon/icon.png',
                          width: 120,
                          height: 120,
                          errorBuilder: (context, error, stackTrace) => const Icon(Icons.android, size: 120),
                        ),
                      ),
                      const SizedBox(height: 20),
                      Text(
                        '$APP_NAME',
                        style: const TextStyle(
                          fontSize: 22,
                          fontWeight: FontWeight.bold,
                          color: Colors.black87,
                        ),
                      ),
                      const SizedBox(height: 10),
                      const SizedBox(
                        width: 100,
                        child: LinearProgressIndicator(minHeight: 2),
                      ),
                    ],
                  ),
                ),
              );
            }
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override
            State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController _controller;
            int _progress = 0;

            @override
            void initState() {
              super.initState();
              _controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(Colors.white)
                ..setNavigationDelegate(NavigationDelegate(
                  onProgress: (progress) => setState(() => _progress = progress), // Indikator progress linear
                  onPageFinished: (_) => setState(() => _progress = 0),
                ))
                ..loadRequest(Uri.parse('$WEB_URL'));
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvoked: (didPop) async {
                  if (didPop) return;
                  if (await _controller.canGoBack()) {
                    await _controller.goBack();
                  } else {
                    SystemNavigator.pop();
                  }
                },
                child: Scaffold(
                  body: SafeArea(
                    child: Column(
                      children: [
                        if (_progress > 0 && _progress < 100)
                          LinearProgressIndicator(
                            value: _progress / 100.0,
                            minHeight: 2,
                            backgroundColor: Colors.transparent,
                          ),
                        Expanded(child: WebViewWidget(controller: _controller)),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          DART

      - name: Fix Android Permissions and App Name
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          MANIFEST="myapp/android/app/src/main/AndroidManifest.xml"
          
          sed -i '/<manifest xmlns:android/a\    <uses-permission android:name="android.permission.INTERNET"\/>' $MANIFEST
          sed -i '/<manifest xmlns:android/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"\/>' $MANIFEST
          sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP_NAME\"/" $MANIFEST

      - name: Setup Network Security (Allow HTTP)
        run: |
          mkdir -p myapp/android/app/src/main/res/xml
          cat > myapp/android/app/src/main/res/xml/network_security_config.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <network-security-config>
            <base-config cleartextTrafficPermitted="true">
              <trust-anchors>
                <certificates src="system"/>
              </trust-anchors>
            </base-config>
          </network-security-config>
          EOF
          
          sed -i 's/<application/<application android:networkSecurityConfig="@xml\/network_security_config"/' \
            myapp/android/app/src/main/AndroidManifest.xml

      - name: Download and Sanitize Icon
        run: |
          mkdir -p myapp/assets/icon
          sudo apt-get install -y imagemagick

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.icon_url }}" \
            -o myapp/assets/icon/icon_raw

          # Mengubah gambar menjadi format PNG 1024x1024 yang valid
          convert myapp/assets/icon/icon_raw \
            -background transparent \
            -gravity center \
            -resize 1024x1024 \
            -extent 1024x1024 \
            myapp/assets/icon/icon.png

      - name: Write launcher icons config
        run: |
          cat > myapp/flutter_launcher_icons.yaml << 'EOF'
          flutter_launcher_icons:
            android: true
            ios: false
            image_path: "assets/icon/icon.png"
            min_sdk_android: 21
          EOF

      - name: Generate Icons
        run: |
          cd myapp
          dart run flutter_launcher_icons -f flutter_launcher_icons.yaml

      - name: Build APK
        run: |
          cd myapp
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-release
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
