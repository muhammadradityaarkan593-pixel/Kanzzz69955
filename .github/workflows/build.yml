name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true

      tag:
        description: "Tag build"
        required: true

      build_type:
        description: "debug / release"
        required: true
        default: "release"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:

      # =========================
      # NODE.JS
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # =========================
      # DOWNLOAD ZIP
      # =========================
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"

          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"

          echo ""
          echo "=== File Info ==="
          ls -lh project.zip

          echo ""
          echo "=== File Type ==="
          file project.zip

          echo ""
          echo "=== First Bytes ==="
          xxd project.zip | head -2

      # =========================
      # EXTRACT ZIP
      # =========================
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="

          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            echo ""
            echo "=== Isi file ==="
            cat project.zip
            exit 1
          fi

          echo "✅ ZIP valid"

          echo ""
          echo "=== Extracting ZIP ==="

          unzip -q project.zip -d project_raw

          echo ""
          echo "=== Isi folder project_raw ==="
          find project_raw | head -50

          echo ""
          echo "=== Searching pubspec.yaml ==="

          PUBSPEC_PATH=$(find project_raw -maxdepth 5 -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi

          echo "✅ pubspec ditemukan:"
          echo "$PUBSPEC_PATH"

          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")

          echo ""
          echo "=== Project Dir ==="
          echo "$PROJECT_DIR"

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      # =========================
      # JAVA
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # FLUTTER
      # =========================
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true

      # =========================
      # FLUTTER DOCTOR
      # =========================
      - name: Flutter Doctor
        run: flutter doctor

      # =========================
      # PUB GET
      # =========================
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get ==="
          flutter pub get

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"

          flutter build apk --${{ github.event.inputs.build_type }}

      # =========================
      # CHECK APK
      # =========================
      - name: Check APK Output
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== APK Output ==="

          find build -name "*.apk"

          APK_PATH="build/app/outputs/flutter-apk/app-${{ github.event.inputs.build_type }}.apk"

          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi

          echo "✅ APK berhasil dibuat"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_PATH"

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
